<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Financial Assistant</title>
<style>
  :root {
    --bg: #f7f7f8; --panel: #ffffff; --text: #1a1a1a; --muted: #6b7280;
    --border: #e5e7eb; --accent: #2563eb; --user-bubble: #2563eb; --user-text: #ffffff;
    --bot-bubble: #f1f3f5; --bot-text: #1a1a1a; --badge: #eef2ff; --badge-text: #3730a3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --panel: #171a21; --text: #e5e7eb; --muted: #9ca3af;
      --border: #2a2e37; --accent: #60a5fa; --user-bubble: #2563eb; --user-text: #ffffff;
      --bot-bubble: #1f232c; --bot-text: #e5e7eb; --badge: #1e2a4a; --badge-text: #93c5fd;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header p { margin: 4px 0 0; font-size: 12px; color: var(--muted); }
  #log {
    flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px;
    max-width: 720px; width: 100%; margin: 0 auto;
  }
  .msg { display: flex; flex-direction: column; max-width: 80%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }
  .bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.45; white-space: pre-wrap; }
  .msg.user .bubble { background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: var(--bot-bubble); color: var(--bot-text); border-bottom-left-radius: 4px; }
  .meta { margin-top: 4px; font-size: 11px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
  .tool-badge { background: var(--badge); color: var(--badge-text); padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .disclaimer { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .error .bubble { background: #fee2e2; color: #991b1b; }
  form {
    display: flex; gap: 8px; padding: 16px 20px; border-top: 1px solid var(--border);
    background: var(--panel); max-width: 720px; width: 100%; margin: 0 auto; box-sizing: border-box;
  }
  input[type=text] {
    flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px; outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  button {
    padding: 10px 18px; border-radius: 10px; border: none; background: var(--accent);
    color: white; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .typing { color: var(--muted); font-size: 13px; font-style: italic; }
  #uploadBtn { background: var(--bot-bubble); color: var(--text); }
</style>
</head>
<body>
  <header>
    <h1>Financial Assistant</h1>
    <p>Document Q&amp;A, news classification, market data — analysis only, not investment advice.</p>
  </header>
  <div id="log"></div>
  <form id="form">
    <input type="file" id="fileInput" accept=".pdf,.md,.txt" hidden>
    <button type="button" id="uploadBtn" title="Upload a document (.pdf/.md/.txt)">Upload</button>
    <input type="text" id="input" placeholder="Ask about a filing, a headline, or a ticker..." autocomplete="off">
    <button type="submit" id="send">Send</button>
  </form>

<script>
const log = document.getElementById('log');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');

function addMessage(role, text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  return wrap;
}

function addMeta(wrap, toolUsed, disclaimer) {
  const meta = document.createElement('div');
  meta.className = 'meta';
  if (toolUsed) {
    const badge = document.createElement('span');
    badge.className = 'tool-badge';
    badge.textContent = toolUsed;
    meta.appendChild(badge);
  }
  wrap.appendChild(meta);
  if (disclaimer) {
    const d = document.createElement('div');
    d.className = 'disclaimer';
    d.textContent = disclaimer;
    wrap.appendChild(d);
  }
}

uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  fileInput.value = '';

  const typing = addMessage('bot', '');
  typing.querySelector('.bubble').innerHTML = `<span class="typing">uploading ${file.name}...</span>`;

  const body = new FormData();
  body.append('file', file);
  try {
    const resp = await fetch('/v1/documents', { method: 'POST', body });
    const data = await resp.json();
    typing.querySelector('.bubble').textContent = resp.ok
      ? `Uploaded ${file.name}: ${data.chunks} chunk(s) indexed, ready to query.`
      : `Upload failed: ${data.detail || resp.statusText}`;
  } catch (err) {
    typing.querySelector('.bubble').textContent = `Upload failed: ${err}`;
  }
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;

  addMessage('user', message);
  input.value = '';
  input.disabled = true;
  sendBtn.disabled = true;

  const typing = addMessage('bot', '');
  typing.querySelector('.bubble').innerHTML = '<span class="typing">thinking...</span>';

  try {
    const resp = await fetch('/v1/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });
    const data = await resp.json();
    if (!resp.ok) {
      typing.className = 'msg bot error';
      typing.querySelector('.bubble').textContent = data.detail || ('Error ' + resp.status);
    } else {
      typing.querySelector('.bubble').textContent = data.answer;
      addMeta(typing, data.tool_used, data.disclaimer);
    }
  } catch (err) {
    typing.className = 'msg bot error';
    typing.querySelector('.bubble').textContent = 'Network error: ' + err.message;
  } finally {
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
  }
});
</script>
</body>
</html>
